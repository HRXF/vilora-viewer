<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilora DriveShot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080d;
            --surface: #101018;
            --border: #1c1c2e;
            --border-hover: #7c5bf5;
            --text: #e4e4ec;
            --text-dim: #5e5e74;
            --accent: #7c5bf5;
            --accent2: #c45bff;
            --glow: rgba(124, 91, 245, 0.25);
            --green: #34d399;
            --orange: #fb923c;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }
        .glow-tl, .glow-br {
            position: fixed; pointer-events: none; border-radius: 50%;
            filter: blur(120px); opacity: .5; z-index: 0;
        }
        .glow-tl {
            width: 600px; height: 600px; top: -200px; left: -150px;
            background: radial-gradient(circle, rgba(124,91,245,.12), transparent 70%);
        }
        .glow-br {
            width: 500px; height: 500px; bottom: -180px; right: -120px;
            background: radial-gradient(circle, rgba(196,91,255,.08), transparent 70%);
        }
        .wrap {
            max-width: 1100px; margin: 0 auto;
            padding: 36px 20px 60px; position: relative; z-index: 1;
        }
        header { text-align: center; margin-bottom: 36px; }
        header h1 {
            font-size: 1.75rem; font-weight: 700; letter-spacing: -.03em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p { color: var(--text-dim); font-size: .88rem; font-weight: 300; margin-top: 4px; }

        .status {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin: 0 auto 32px; padding: 12px 20px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 40px; max-width: 520px;
        }
        .status-item { display: flex; align-items: center; gap: 7px; font-size: .8rem; color: var(--text-dim); }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,.6);
            animation: blink 2s ease-in-out infinite;
        }
        .dot.poll { background: var(--orange); box-shadow: 0 0 6px rgba(251,146,60,.6); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: .78rem; }
        .badge { background: rgba(124,91,245,.12); color: var(--accent); padding: 2px 8px; border-radius: 5px; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            transition: border-color .25s, box-shadow .25s, transform .25s;
            animation: slideUp .45s cubic-bezier(.4,0,.2,1) both;
        }
        .card:hover {
            border-color: var(--border-hover);
            box-shadow: 0 0 24px var(--glow);
            transform: translateY(-3px);
        }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(16px) scale(.98); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }
        .card img { width: 100%; display: block; cursor: pointer; }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; border-top: 1px solid var(--border);
        }
        .card-time { font-family: 'JetBrains Mono', monospace; font-size: .72rem; color: var(--text-dim); }
        .card-actions { display: flex; gap: 6px; }
        .btn-sm {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            padding: 4px 10px; border-radius: 7px; cursor: pointer;
            font-size: .72rem; font-family: 'Outfit', sans-serif; transition: all .2s;
        }
        .btn-sm:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,91,245,.08); }

        .empty { text-align: center; padding: 90px 20px; color: var(--text-dim); }
        .empty .ico { font-size: 3.4rem; margin-bottom: 16px; opacity: .3; }
        .empty h2 { font-size: 1.2rem; font-weight: 500; color: var(--text); margin-bottom: 6px; }
        .empty p { font-weight: 300; font-size: .9rem; }

        .lb {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.92); backdrop-filter: blur(12px);
            z-index: 200; align-items: center; justify-content: center; cursor: pointer;
        }
        .lb.open { display: flex; }
        .lb img { max-width: 94vw; max-height: 92vh; border-radius: 6px; box-shadow: 0 0 50px rgba(0,0,0,.6); }

        @media (max-width: 680px) {
            .gallery { grid-template-columns: 1fr; }
            .status { flex-wrap: wrap; gap: 10px; padding: 10px 16px; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="glow-tl"></div>
    <div class="glow-br"></div>
    <div class="wrap">
        <header>
            <h1>Vilora DriveShot</h1>
            <p>Live Screenshot Viewer</p>
        </header>
        <div class="status">
            <div class="status-item">
                <div class="dot" id="dot"></div>
                <span id="statusLabel">Connecting</span>
            </div>
            <div class="status-item">
                Session <span class="mono badge" id="sid">driveshot</span>
            </div>
            <div class="status-item">
                <span class="mono" id="count">0</span>&nbsp;photos
            </div>
        </div>
        <div class="gallery" id="gallery"></div>
        <div class="empty" id="empty" style="display:none">
            <div class="ico">📸</div>
            <h2>Waiting for screenshots…</h2>
            <p>Screenshots will appear here within seconds of being taken.</p>
        </div>
    </div>
    <div class="lb" id="lb" onclick="closeLb()">
        <img id="lbImg" src="" alt="Full screenshot">
    </div>

    <script>
        const NPOINT_BIN = '218fca7bacc83961de7b';
        const POLL = 3000;

        const rendered = new Set();

        function init() {
            document.getElementById('empty').style.display = 'block';
            poll();
            setInterval(poll, POLL);
        }

        async function poll() {
            const dot = document.getElementById('dot');
            const label = document.getElementById('statusLabel');
            dot.classList.add('poll');
            label.textContent = 'Checking…';

            try {
                const r = await fetch(`https://api.npoint.io/${NPOINT_BIN}`, { cache: 'no-store' });
                if (!r.ok) { throw new Error('fetch failed'); }

                const data = await r.json();
                const shots = data.screenshots || [];

                // Sort newest first
                shots.sort((a, b) => parseInt(b.timestamp) - parseInt(a.timestamp));

                shots.forEach((shot, i) => {
                    if (!rendered.has(shot.timestamp)) {
                        rendered.add(shot.timestamp);
                        addCard(shot, i);
                    }
                });

                document.getElementById('count').textContent = shots.length;
                document.getElementById('empty').style.display = shots.length ? 'none' : 'block';

            } catch (e) {
                console.log('Poll error:', e);
            }

            dot.classList.remove('poll');
            label.textContent = 'Watching';
        }

        function addCard(shot, idx) {
            const gallery = document.getElementById('gallery');
            const full = shot.url;
            const thumb = full.replace('/upload/', '/upload/c_fit,w_640,q_auto/');
            const ts = parseInt(shot.timestamp) || 0;
            const time = ts ? new Date(ts * 1000).toLocaleString() : '';

            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${Math.min(idx, 5) * 0.06}s`;
            card.innerHTML = `
                <img src="${thumb}" alt="Screenshot" loading="lazy" onclick="openLb('${full}')">
                <div class="card-footer">
                    <span class="card-time">${time}</span>
                    <div class="card-actions">
                        <button class="btn-sm" onclick="openLb('${full}')">View</button>
                        <button class="btn-sm" onclick="window.open('${full}','_blank')">Open</button>
                    </div>
                </div>`;
            gallery.insertBefore(card, gallery.firstChild);
        }

        function openLb(url) {
            document.getElementById('lbImg').src = url;
            document.getElementById('lb').classList.add('open');
        }
        function closeLb() { document.getElementById('lb').classList.remove('open'); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

        init();
    </script>
</body>
</html>
